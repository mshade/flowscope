version: '3'

tasks:
  test:
    desc: Run all tests
    cmd: uv run pytest tests/ -v

  lint:
    desc: Lint with ruff
    cmd: uv run ruff check src/ tests/

  fmt:
    desc: Format code with ruff
    cmd: uv run ruff format src/ tests/

  fmt:check:
    desc: Check formatting without modifying files
    cmd: uv run ruff format --check src/ tests/

  check:
    desc: Lint, format check, and test
    deps: [lint, fmt:check, test]

  scan:
    desc: |
      Run flowscope against a GitHub repo or specific workflow files.
      Usage:
        task scan -- https://github.com/owner/repo
        task scan -- https://github.com/owner/repo .github/workflows/build.yml [...]
    vars:
      ARGS: '{{.CLI_ARGS}}'
    cmd: |
      set -euo pipefail
      if ! command -v gh &>/dev/null; then
        echo "error: 'gh' (GitHub CLI) is required for task scan." >&2
        echo "Install it from https://cli.github.com, then run 'gh auth login'." >&2
        exit 1
      fi
      ARGS=({{.ARGS}})
      if [[ ${#ARGS[@]} -eq 0 ]]; then
        echo "Usage: task scan -- <github-repo-url> [workflow-file ...]" >&2
        exit 1
      fi

      FIRST="${ARGS[0]}"
      TMPDIR=$(mktemp -d)
      trap 'rm -rf "$TMPDIR"' EXIT

      # Extract owner/repo from a github.com URL
      if [[ "$FIRST" =~ github\.com/([^/]+/[^/]+) ]]; then
        OWNER_REPO="${BASH_REMATCH[1]}"

        if [[ ${#ARGS[@]} -gt 1 ]]; then
          # Specific workflow files given as additional args
          for WF_PATH in "${ARGS[@]:1}"; do
            WF_NAME=$(basename "$WF_PATH")
            echo "=== Scanning ${OWNER_REPO}/${WF_PATH} ==="
            gh api "repos/${OWNER_REPO}/contents/${WF_PATH}" --jq '.content' \
              | base64 -d > "$TMPDIR/${WF_NAME}"
            uv run flowscope "$TMPDIR/${WF_NAME}" || true
          done
        else
          # Discover all workflows in the repo — capture raw response for reliable parsing
          GH_ERR=$(mktemp)
          RAW=$(gh api "repos/${OWNER_REPO}/contents/.github/workflows" \
            --paginate 2>"$GH_ERR") || {
            GH_EXIT=$?
            if grep -qi "404\|not found\|could not resolve" "$GH_ERR" 2>/dev/null \
               || echo "$RAW" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('status')=='404' else 1)" 2>/dev/null; then
              echo "Repository or workflows directory not found: ${OWNER_REPO}" >&2
            else
              cat "$GH_ERR" >&2
            fi
            rm -f "$GH_ERR"
            exit $GH_EXIT
          }
          rm -f "$GH_ERR"
          WORKFLOWS=$(echo "$RAW" | python3 -c 'import sys,json; d=json.load(sys.stdin); (print("Unexpected API response: "+str(d)[:200],file=sys.stderr) or sys.exit(1)) if not isinstance(d,list) else [print(f["name"]) for f in d if f.get("type")=="file" and f["name"].endswith((".yml",".yaml"))]')
          if [[ -z "$WORKFLOWS" ]]; then
            echo "No workflow files (.yml/.yaml) found in ${OWNER_REPO}/.github/workflows" >&2
            exit 1
          fi
          while IFS= read -r WF_NAME; do
            echo "=== Scanning ${WF_NAME} ==="
            gh api "repos/${OWNER_REPO}/contents/.github/workflows/${WF_NAME}" \
              --jq '.content' | base64 -d > "$TMPDIR/${WF_NAME}"
            uv run flowscope "$TMPDIR/${WF_NAME}" || true
          done <<< "$WORKFLOWS"
        fi
      else
        echo "Expected a github.com URL, got: $FIRST" >&2
        exit 1
      fi
